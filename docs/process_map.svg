<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#556"/>
    </marker>
    <style>
      .title  { font-size: 22px; font-weight: 700; }
      .badge  { font-size: 13px; font-weight: 700; fill: #fff; }
      .box    { font-size: 14px; }
      .note   { font-size: 12px; font-style: italic; fill: #667; }
      .col    { font-size: 15px; font-weight: 700; }
    </style>
  </defs>

  <!-- ============ BEFORE (left) ============ -->
  <rect x="20" y="20" width="540" height="600" rx="14" fill="#fbf3f2" stroke="#e6b3ab"/>
  <rect x="20" y="20" width="540" height="46" rx="14" fill="#c0392b"/>
  <text x="290" y="50" text-anchor="middle" class="title" fill="#fff">BEFORE — Manual reconciliation</text>

  <rect x="50" y="90"  width="140" height="52" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="120" y="112" text-anchor="middle" class="box">Download</text>
  <text x="120" y="130" text-anchor="middle" class="box">ledger export</text>
  <rect x="220" y="90" width="140" height="52" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="290" y="112" text-anchor="middle" class="box">Download</text>
  <text x="290" y="130" text-anchor="middle" class="box">bank statement</text>
  <rect x="390" y="90" width="140" height="52" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="460" y="112" text-anchor="middle" class="box">Notes arrive</text>
  <text x="460" y="130" text-anchor="middle" class="box">email / PDF</text>

  <line x1="290" y1="142" x2="290" y2="170" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="70" y="172" width="440" height="48" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="290" y="201" text-anchor="middle" class="box">Eyeball / VLOOKUP in Excel to line up references &#8226; ~hours</text>
  <line x1="290" y1="220" x2="290" y2="244" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="70" y="246" width="440" height="48" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="290" y="275" text-anchor="middle" class="box">Manually spot breaks; copy-paste; re-key amounts &#8226; error-prone</text>
  <line x1="290" y1="294" x2="290" y2="318" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="70" y="320" width="440" height="48" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="290" y="349" text-anchor="middle" class="box">Read each note by hand to guess WHY &#8226; context buried</text>
  <line x1="290" y1="368" x2="290" y2="392" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="70" y="394" width="440" height="48" rx="8" fill="#fff" stroke="#c0392b"/>
  <text x="290" y="423" text-anchor="middle" class="box">Email manager for sign-off &#8226; no consistent audit trail</text>

  <rect x="50" y="470" width="460" height="128" rx="10" fill="#f6dcd8" stroke="#c0392b"/>
  <text x="70" y="496" class="col" fill="#8e2c22">Pain points</text>
  <text x="70" y="522" class="box">&#8226; Multi-hour task, repeated every day</text>
  <text x="70" y="544" class="box">&#8226; Missed breaks &amp; inconsistent categorisation</text>
  <text x="70" y="566" class="box">&#8226; "Why" buried in messy free-text notes</text>
  <text x="70" y="588" class="box">&#8226; No reproducible audit trail / weak controls</text>

  <!-- ============ AFTER (right) ============ -->
  <rect x="620" y="20" width="540" height="600" rx="14" fill="#f0f7f2" stroke="#a9cdb6"/>
  <rect x="620" y="20" width="540" height="46" rx="14" fill="#1e7d46"/>
  <text x="890" y="50" text-anchor="middle" class="title" fill="#fff">AFTER — FinRecon Copilot</text>

  <rect x="650" y="90"  width="150" height="52" rx="8" fill="#fff" stroke="#1e7d46"/>
  <text x="725" y="112" text-anchor="middle" class="box">ledger.csv</text>
  <text x="725" y="130" text-anchor="middle" class="box">bank_feed.csv</text>
  <rect x="830" y="90" width="150" height="52" rx="8" fill="#fff" stroke="#1e7d46"/>
  <text x="905" y="112" text-anchor="middle" class="box">remittance</text>
  <text x="905" y="130" text-anchor="middle" class="box">notes (txt/PDF)</text>

  <line x1="725" y1="142" x2="820" y2="170" stroke="#556" marker-end="url(#arrow)"/>
  <line x1="905" y1="142" x2="1010" y2="318" stroke="#556" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

  <rect x="670" y="172" width="440" height="52" rx="8" fill="#eaf5ee" stroke="#1e7d46"/>
  <rect x="670" y="172" width="86" height="52" rx="8" fill="#1e7d46"/>
  <text x="713" y="203" text-anchor="middle" class="badge">RULES</text>
  <text x="935" y="197" text-anchor="middle" class="box">SQL + Python reconcile (exact, tested)</text>
  <text x="935" y="215" text-anchor="middle" class="note">&#8594; list of BREAKS</text>
  <line x1="890" y1="224" x2="890" y2="248" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="670" y="250" width="440" height="52" rx="8" fill="#eef2fb" stroke="#3358c4"/>
  <rect x="670" y="250" width="86" height="52" rx="8" fill="#3358c4"/>
  <text x="713" y="281" text-anchor="middle" class="badge">AI</text>
  <text x="935" y="275" text-anchor="middle" class="box">LLM reads note (temp 0): classify +</text>
  <text x="935" y="293" text-anchor="middle" class="box">extract + summarise &#8594; JSON</text>
  <line x1="890" y1="302" x2="890" y2="326" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="670" y="328" width="440" height="52" rx="8" fill="#fdf3e6" stroke="#c8781a"/>
  <rect x="670" y="328" width="86" height="52" rx="8" fill="#c8781a"/>
  <text x="713" y="359" text-anchor="middle" class="badge">CONTROL</text>
  <text x="935" y="353" text-anchor="middle" class="box">mask PII &#8594; validate &#8594; audit log &#8594;</text>
  <text x="935" y="371" text-anchor="middle" class="box">human approves what matters</text>
  <line x1="890" y1="380" x2="890" y2="404" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="670" y="406" width="440" height="52" rx="8" fill="#eaf5ee" stroke="#1e7d46"/>
  <text x="890" y="430" text-anchor="middle" class="box">Power Automate: schedule + route</text>
  <text x="890" y="448" text-anchor="middle" class="box">approval + alert on failure</text>
  <line x1="890" y1="458" x2="890" y2="482" stroke="#556" marker-end="url(#arrow)"/>

  <rect x="670" y="484" width="440" height="46" rx="8" fill="#eaf5ee" stroke="#1e7d46"/>
  <text x="890" y="512" text-anchor="middle" class="box">Power BI dashboard: match rate &#8226; cause &#8226; value at risk</text>

  <rect x="650" y="548" width="460" height="50" rx="10" fill="#dcefe3" stroke="#1e7d46"/>
  <text x="890" y="570" text-anchor="middle" class="col" fill="#155e34">Rules for the math &#8226; AI for the language &#8226; human for the decisions</text>
  <text x="890" y="590" text-anchor="middle" class="note">Minutes, not hours &#8226; consistent &#8226; audit-ready</text>
</svg>
